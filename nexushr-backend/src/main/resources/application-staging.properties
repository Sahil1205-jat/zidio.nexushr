# Staging (Testing) Configuration

# Database Configuration - Use a SEPARATE database for staging
spring.datasource.url=${SPRING_DATASOURCE_URL}

# JPA/Hibernate Configuration
# 'update' is often acceptable in staging to allow for easier schema changes during development
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Email Configuration (can use the same or a test account)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Server Configuration
server.port=8080

# Logging
logging.level.root=INFO
logging.level.com.zidio.nexushr=DEBUG

# --- HTTP API Email Option ---
nexushr.brevo.api-key=${BREVO_API_KEY:}
