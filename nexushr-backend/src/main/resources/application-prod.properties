# Production Configuration

# Database Configuration (PostgreSQL on Render)
# This will use the connection string provided by the Render environment
spring.datasource.url=${SPRING_DATASOURCE_URL}

# JPA/Hibernate Configuration
# 'validate' is safer for production. It checks if the schema matches the entities.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Server Configuration
server.port=8080

# Logging
logging.level.root=INFO
logging.level.com.zidio.nexushr=INFO

# --- HTTP API Email Option ---
nexushr.brevo.api-key=${BREVO_API_KEY:}
